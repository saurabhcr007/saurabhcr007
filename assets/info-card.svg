<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111722"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="480" height="320" rx="12" fill="url(#bg-grad)"/>
  <rect x="0.5" y="0.5" width="479" height="319" rx="12" fill="none" stroke="#30363d"/>

  <!-- Title bar -->
  <line x1="0" y1="30" x2="480" y2="30" stroke="#30363d"/>
  <circle cx="20" cy="15" r="5.5" fill="#ff5f56"/>
  <circle cx="38" cy="15" r="5.5" fill="#ffbd2e"/>
  <circle cx="56" cy="15" r="5.5" fill="#27c93f"/>
  <text x="240" y="19" fill="#7d8590" font-size="12" text-anchor="middle">saurabh@github: ~</text>

  <!-- Prompt line -->
  <text x="20" y="58" font-size="13" font-weight="700">
    <tspan fill="#3fb950">saurabh</tspan>
    <tspan fill="#7d8590">@</tspan>
    <tspan fill="#22d3ee">github</tspan>
    <tspan fill="#c9d1d9"> ~ $ </tspan>
    <tspan fill="#f0f6fc">neofetch</tspan>
  </text>

  <!-- Separator line -->
  <line x1="20" y1="70" x2="460" y2="70" stroke="#30363d" stroke-opacity="0.6"/>

  <!-- Info rows -->
  <!-- OS -->
  <text x="30" y="92" font-size="12">
    <tspan fill="#58A6FF" font-weight="700">OS</tspan>
    <tspan fill="#30363d">──────</tspan>
    <tspan fill="#c9d1d9"> Ubuntu / Arch Linux</tspan>
  </text>

  <!-- Shell -->
  <text x="30" y="112" font-size="12">
    <tspan fill="#58A6FF" font-weight="700">Shell</tspan>
    <tspan fill="#30363d">────</tspan>
    <tspan fill="#c9d1d9"> bash / zsh + tmux</tspan>
  </text>

  <!-- Role -->
  <text x="30" y="132" font-size="12">
    <tspan fill="#58A6FF" font-weight="700">Role</tspan>
    <tspan fill="#30363d">─────</tspan>
    <tspan fill="#c9d1d9"> Cloud Engineer • DevOps • SRE</tspan>
  </text>

  <!-- Focus -->
  <text x="30" y="152" font-size="12">
    <tspan fill="#58A6FF" font-weight="700">Focus</tspan>
    <tspan fill="#30363d">────</tspan>
    <tspan fill="#c9d1d9"> Cloud Native • K8s • IaC • Observability</tspan>
  </text>

  <!-- Stack -->
  <text x="30" y="172" font-size="12">
    <tspan fill="#58A6FF" font-weight="700">Stack</tspan>
    <tspan fill="#30363d">────</tspan>
    <tspan fill="#c9d1d9"> AWS • Terraform • K8s • Helm • ArgoCD</tspan>
  </text>

  <!-- CI/CD -->
  <text x="30" y="192" font-size="12">
    <tspan fill="#58A6FF" font-weight="700">CI/CD</tspan>
    <tspan fill="#30363d">────</tspan>
    <tspan fill="#c9d1d9"> GitHub Actions • Jenkins • GitLab CI</tspan>
  </text>

  <!-- Monitoring -->
  <text x="30" y="212" font-size="12">
    <tspan fill="#58A6FF" font-weight="700">Monitoring</tspan>
    <tspan fill="#30363d">──</tspan>
    <tspan fill="#c9d1d9"> Prometheus • Grafana • Loki</tspan>
  </text>

  <!-- Goal -->
  <text x="30" y="232" font-size="12">
    <tspan fill="#3fb950" font-weight="700">Goal</tspan>
    <tspan fill="#30363d">─────</tspan>
    <tspan fill="#c9d1d9"> Master's CS — Germany 🇩🇪 (2026)</tspan>
  </text>

  <!-- GitHub -->
  <text x="30" y="252" font-size="12">
    <tspan fill="#58A6FF" font-weight="700">GitHub</tspan>
    <tspan fill="#30363d">───</tspan>
    <tspan fill="#c9d1d9"> @saurabhcr007</tspan>
  </text>

  <!-- Color blocks -->
  <rect x="30" y="268" width="14" height="14" rx="2" fill="#ff5f56"/>
  <rect x="48" y="268" width="14" height="14" rx="2" fill="#ffbd2e"/>
  <rect x="66" y="268" width="14" height="14" rx="2" fill="#27c93f"/>
  <rect x="84" y="268" width="14" height="14" rx="2" fill="#58A6FF"/>
  <rect x="102" y="268" width="14" height="14" rx="2" fill="#7B42BC"/>
  <rect x="120" y="268" width="14" height="14" rx="2" fill="#E6522C"/>
  <rect x="138" y="268" width="14" height="14" rx="2" fill="#F46800"/>
  <rect x="156" y="268" width="14" height="14" rx="2" fill="#22d3ee"/>

  <!-- Cursor blink at bottom -->
  <text x="30" y="305" font-size="13" fill="#c9d1d9">
    <tspan fill="#3fb950">saurabh</tspan>
    <tspan fill="#7d8590">@</tspan>
    <tspan fill="#22d3ee">github</tspan>
    <tspan fill="#c9d1d9"> ~ $ </tspan>
    <tspan fill="#58A6FF">█</tspan>
  </text>
</svg>
