name: 📊 Generate GitHub Profile Metrics

on:
  schedule:
    # Runs daily at 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    name: Generate Profile Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Generate base metrics (overview)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: saurabhcr007
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_order: base.header, base.activity, base.community, base.repositories
          config_display: large
          filename: metrics/metrics-overview.svg

      - name: Generate language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: saurabhcr007
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_ignored: html, css, less, scss
          filename: metrics/metrics-languages.svg

      - name: Generate achievements metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: saurabhcr007
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0
          filename: metrics/metrics-achievements.svg
